version: '3.8'
services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"   # 애플리케이션 통신용
      - "15672:15672" # 관리자 대시보드 (ID: guest / PW: guest)

  # 인스턴스 1
  order-service-1:
    build: .
    ports:
      - "8081:8081"
    environment:
      - SERVER_PORT=8081
      - SPRING_RABBITMQ_HOST=rabbitmq
    depends_on:
      - rabbitmq

  # 인스턴스 2
  order-service-2:
    build: .
    ports:
      - "8082:8082"
    environment:
      - SERVER_PORT=8082
      - SPRING_RABBITMQ_HOST=rabbitmq
    depends_on:
      - rabbitmq